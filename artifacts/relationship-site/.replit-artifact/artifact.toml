kind = "web"
previewPath = "/"
title = "Our Story"
version = "1.0.0"
id = "artifacts/relationship-site"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 18547

[services.development]
run = "pnpm --filter @workspace/relationship-site run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/relationship-site", "run", "build" ]
publicDir = "artifacts/relationship-site/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "18547"
BASE_PATH = "/"
